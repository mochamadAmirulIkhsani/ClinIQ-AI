version: 1

applications:
  - appRoot: apps/web
    frontend:
      buildPath: /

      phases:
        preBuild:
          commands:
            - npm install -g bun@1.3.14
            - bun ci

        build:
          commands:
            - bunx turbo run build --filter=web

      artifacts:
        baseDirectory: apps/web/.next
        files:
          - "**/*"

      cache:
        paths:
          - node_modules/**/*
          - apps/web/.next/cache/**/*
          - .turbo/**/*